<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Cadic</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

header{
background:#1e88e5;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
background:#1e88e5;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1565c0;
}
</style>

</head>

<body>

<header>
<h1>Gestion des logements Cadic</h1>
<p>Application interne pour le DRH</p>
</header>

<div class="container">

<div class="card">
<h2>Déclarer une absence</h2>
<p>L’occupant peut signaler un voyage.</p>
<button onclick="absence()">Signaler</button>
</div>

<div class="card">
<h2>Notifications</h2>
<p>Voir les alertes importantes.</p>
<button onclick="notif()">Voir</button>
</div>

<div class="card">
<h2>Interventions techniques</h2>
<p>Planifier une intervention.</p>
<button onclick="intervention()">Planifier</button>
</div>

</div>

<script>

function absence(){
alert("Absence signalée au DRH");
}

function notif(){
alert("Aucune nouvelle notification");
}

function intervention(){
alert("Intervention programmée");
}

</script>

</body>
  </html>
